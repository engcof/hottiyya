{% extends "base.html" %}

{% block title %}تسجيل الدخول -  الحوطية{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/add-edit.css') }}">
{% endblock %}

{% block content %}
<section class="add-edit-page"> <div class="form-card" style="max-width: 450px;"> <div class="form-header">
            <h2 class="form-title">مرحباً بعودتك</h2>
            <p class="form-subtitle">سجّل دخولك للوصول إلى موقع الحوطية</p>
        </div>

        {% if error %}
        <div class="alert error">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()">×</button>
        </div>
        {% endif %}

        <form method="post" action="/auth/login" class="news-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" name="username" id="username" class="input-field" 
                       placeholder="أدخل اسم المستخدم..." required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" name="password" id="password" class="input-field" 
                       placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div style="margin-top: 30px;">
                <button type="submit" class="btn-submit-main">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </div>

            <div class="form-footer" style="text-align: center; margin-top: 20px;">
                <p style="color: #64748b; font-size: 0.9rem;">
                    ليس لديك حساب؟ 
                    <a href="/auth/register" class="cancel-text-link" style="margin: 0; padding: 0;">إنشاء حساب جديد</a>
                </p>
            </div>
        </form>
    </div>
</section>
{% endblock %}
