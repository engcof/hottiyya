{% extends "base.html" %}
{% block title %}تسجيل الدخول - عائلة الحوطية{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card glass-strong">
        <!-- العنوان -->
        <div class="auth-header">
            <h2 class="auth-title">مرحباً بعودتك</h2>
            <p class="auth-subtitle">سجّل دخولك </p>
        </div>

        <!-- رسالة الخطأ إذا وُجدت -->
        {% if error %}
        <div class="alert error flash-message">❌<span>{{ error }}</span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()">×</button>
        </div>
        {% endif %}

        <!-- نموذج تسجيل الدخول -->
        <form method="post" action="/auth/login" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" name="username" id="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" name="password" id="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn full-width">
                تسجيل الدخول
            </button>

            <div class="auth-footer">
                <p>ليس لديك حساب؟ 
                    <a href="/auth/register" class="link-accent">إنشاء حساب جديد</a>
                </p>
            </div>
        </form>
    </div>
</section>
{% endblock %}
