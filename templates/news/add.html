{% extends "base.html" %}

{% block title %}إضافة خبر جديد -  الحوطية{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/add-edit.css') }}">
{% endblock %}

{% block content %}
<section class="add-edit-page">
    <div class="form-card">
        <div class="form-header"> 
            <h2 class="form-title">نشر خبر جديد</h2>
            <p class="form-subtitle">أطلع  على آخر المستجدات والفعاليات</p>
        </div>

        <form method="post" action="/news/add" enctype="multipart/form-data" class="news-form" id="newsForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label>عنوان الخبر <span class="required">*</span></label>
                <input type="text" name="title" class="input-field" value="{{ form_data.get('title', '') }}"placeholder="اكتب عنواناً واضحاً..." required>
            </div>

            <div class="form-group">
                <label>تفاصيل الخبر <span class="required">*</span></label>
                <textarea name="content" class="input-field" rows="8" value="{{ form_data.get('content', '') }}"placeholder="اكتب تفاصيل الخبر هنا..." required></textarea>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>الناشر</label>
                    <input type="text" name="author" value="{{ user.username or 'غير معروف' }}" readonly class="input-field readonly-input">
                </div>
                
                <div class="form-group">
                    <label>صورة الخبر</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="newsImage" name="image" accept="image/*" style="opacity: 0; position: absolute; inset: 0; cursor: pointer;">
                        
                        <div id="uploadContent">
                            <i class="fas fa-image" style="font-size: 1.8rem; color: var(--accent); margin-bottom: 8px;"></i>
                            <p id="fileStatusText">اضغط لرفع صورة الخبر</p>
                        </div>

                        <div id="imagePreview" style="display: none; margin-top: 10px;">
                            <img id="previewImg" src="" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid var(--accent);">
                            <p id="removePreview" style="color: #ef4444; font-size: 0.8rem; margin-top: 5px; cursor: pointer; font-weight: bold;">
                                <i class="fas fa-trash-alt"></i> إزالة
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <button type="submit" class="btn-submit-main">
                    <i class="fas fa-paper-plane"></i> نشر الخبر
                </button>
            </div>
              <div class="form-footer">
                <a href="/news"  class="cancel-text-link">
                    <i class="fas fa-arrow-right" style="font-size: 0.8rem;"></i>إلغاء والعودة للأخبار
                </a>
            </div>
        </form>
    </div>
</section>

<script src="{{ url_for('static', path='js/news-actions.js') }}"></script>
{% endblock %}
