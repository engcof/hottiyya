{% extends "base.html" %}
{% block title %}تعديل: {{ member.name }}{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/add-edit.css') }}">
{% endblock %}

{% block content %}
<section class="add-edit-page">
    <div class="form-card" style="max-width: 1000px;">
        <div class="form-header">
            <h1 class="form-title">تعديل بيانات العضو</h1>
            <p class="form-subtitle">تحديث سجل: <strong>{{ member.name }}</strong> ({{ code }})</p>
        </div>

        <form method="post" action="/names/edit/{{ code }}" enctype="multipart/form-data" class="news-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-grid">
                <div class="form-group">
                    <label>الاسم <span class="required">*</span></label>
                    <input type="text" name="name" class="input-field" value="{{ member.name }}" required>
                </div>

                <div class="form-group">
                    <label>اللقب (اختياري)</label>
                    <input type="text" name="nick_name" class="input-field" value="{{ member.nick_name or '' }}">
                </div>

                <div class="form-group">
                    <label>الجنس</label>
                    <select name="gender" class="input-field">
                        <option value="">-- اختر --</option>
                        <option value="ذكر" {% if info.gender == "ذكر" %}selected{% endif %}>ذكر</option>
                        <option value="أنثى" {% if info.gender == "أنثى" %}selected{% endif %}>أنثى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>المستوى (الجيل)</label>
                    <input type="number" name="level" class="input-field" value="{{ member.level }}" min="0">
                </div>

                <div class="form-group">
                    <label>كود الأب</label>
                    <input type="text" name="f_code" class="input-field" value="{{ member.f_code or '' }}" >
                </div>

                <div class="form-group">
                    <label>كود الأم</label>
                    <input type="text" name="m_code" class="input-field" value="{{ member.m_code or '' }}" >
                </div>

                <div class="form-group">
                    <label>كود الزوج (للأنثى)</label>
                    <input type="text" name="h_code" class="input-field" value="{{ member.h_code or '' }}" >
                </div>

                <div class="form-group">
                    <label>كود الزوجة (للذكر)</label>
                    <input type="text" name="w_code" class="input-field" value="{{ member.w_code or '' }}" >
                </div>

                <div class="form-group">
                    <label>العلاقة</label>
                    <select name="relation" class="input-field">
                        <option value="">-- اختر --</option>
                        {% set relations = ["ابن", "ابنة", "زوج", "زوجة", "ابن زوج", "ابنة زوج", "ابن زوجة", "ابنة زوجة"] %}
                        {% for rel in relations %}
                        <option value="{{ rel }}" {% if member.relation == rel %}selected{% endif %}>{{ rel }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>تاريخ الميلاد</label>
                    <input type="date" name="d_o_b" class="input-field" value="{{ info.d_o_b or '' }}">
                </div>
                <div class="form-group">
                    <label>تاريخ الوفاة</label>
                    <input type="date" name="d_o_d" class="input-field" value="{{ info.d_o_d or '' }}">
                </div>
                <div class="form-group">
                    <label>مكان الميلاد</label>
                    <input type="text" name="p_o_b" class="input-field" value="{{ info.p_o_b or '' }}" placeholder="المدينة/الدولة">
                </div>

                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="text" name="phone" class="input-field" value="{{ info.phone or '' }}">
                </div>

                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email" class="input-field" value="{{ info.email or '' }}">
                </div>

                <div class="form-group" >
                    <label>العنوان الحالي</label>
                    <input type="text" name="address" class="input-field" value="{{ info.address or '' }}">
                </div>
          
                <div class="form-group">
                    <label>الحالة</label>
                    <select name="status" class="input-field">
                        <option value="">-- اختر --</option>
                        {% set stats =  [ "حي" , "حية" , "متوفي" , "متوفية" ]  %}
                        {% for sts in stats %}
                        <option value="{{ sts }}" {% if info.status == sts %}selected{% endif %}>{{ sts }}</option>
                        {% endfor %}
                    </select>
                </div>
           </div>
                <div class="form-group" style="grid-column: span 2;">
                    <div class="file-input-wrapper">
                        {% if picture_url %}
                            <img src="{{ picture_url }}" alt="الحالية" style="width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px;">
                        {% endif %}
                        <label style="display: block; margin-bottom: 5px;">تحديث الصورة الشخصية</label>
                        <input type="file" name="picture" accept="image/*" class="input-field">
                    </div>
                </div>
            
            <div style="margin-top: 35px;">
                <button type="submit" class="btn-submit-main">تحديث بيانات العضو</button>
            </div>
            
            <div class="form-footer">
                <a href="/names/details/{{ code }}" class="cancel-text-link">رجوع للتفاصيل</a>
                <span style="margin: 0 10px; color: #cbd5e0;">|</span>
                <a href="/names" class="cancel-text-link">قائمة الشجرة</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
