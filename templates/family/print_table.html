<table class="print-table">
    <thead>
        <tr>
            <th>الكود</th>
            <th>الاسم الكامل</th>
            <th>العلاقة</th>
            <th>الهاتف</th>
        </tr>
    </thead>
    <tbody>
        {% for member in all_members %}
        <tr>
            <td>{{ member.الكود }}</td>
            <td>{{ member['الاسم الكامل'] }}</td>
            <td>{{ member.العلاقة }}</td>
            <td>{{ member.الهاتف }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
