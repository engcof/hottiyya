{% extends "base.html" %}
{% block title %}إضافة مستخدم{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card glass-strong">
        <div class="auth-header">
             <h1 class="auth-title">إضافة مستخدم جديد</h1>
                <p class="auth-subtitle">قم بإنشاء حساب جديد للمستخدمين</p>
        </div>

   
           {% if error %}
        <div class="alert error flash-message">❌
            <span>{{ error }}</span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()">×</button>
        </div>
        {% endif %}
        <form method="post" action="/admin/add_user" class="form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" required>
            </div>
             <div class="form-group">
                        <label>الدور</label>
                        <select name="role">
                            <option value="manager">مدير</option>
                            <option value="user" selected>مستخدم</option>
                        </select>
                    </div>
            <div class="form-actions">
                <button type="submit" class="btn-success">إضافة</button>
                <a href="/admin" class="btn-secondary">رجوع</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
