{% extends "base.html" %}
{% block title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card glass-strong">
        <div class="auth-header">
             <h1 class="auth-title">تغيير كلمة مرور</h1>
             <p class="auth-subtitle">اختر المستخدم وقم بتعيين كلمة مرور جديدة</p>
        </div>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/change_password" class="member-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label>اختر المستخدم</label>
                <select name="user_id" class="custom-select" required>
                    <option value="">-- اختر مستخدماً --</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input type="password" name="new_password" class="custom-input" required placeholder="أدخل كلمة المرور الجديدة">
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn warning">تحديث كلمة المرور</button>
                <a href="/admin" class="cancel-link">رجوع</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
