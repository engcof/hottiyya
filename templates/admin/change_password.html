{% extends "base.html" %}

{% block title %}تغيير كلمة المرور - الإدارة{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/add-edit.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}">
{% endblock %}

{% block content %}
<section class="add-edit-page">
    <div class="container form-card-auth">
        
        <div class="form-card">
            
            <div class="form-header">
                 <h1 class="form-title">تغيير كلمة المرور</h1>
                 <p class="form-subtitle">إعادة تعيين كلمة مرور جديدة لأحد أعضاء المنصة</p>
            </div>

            {% if error %}
            <div class="alert error flash-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
                <button type="button" class="alert-close" onclick="this.parentElement.remove()">×</button>
            </div>
            {% endif %}

            <form method="POST" action="/admin/change_password" class="news-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <div class="form-group">
                    <label>اختر المستخدم المستهدف <span class="required">*</span></label>
                    <select name="user_id" class="input-field" required>
                        <option value="" disabled selected>-- اختر من قائمة المستخدمين --</option>
                        {% for u in users %}
                        <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>كلمة المرور الجديدة <span class="required">*</span></label>
                    <input type="password" name="new_password" class="input-field" required placeholder="أدخل كلمة المرور الجديدة...">
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-submit-main btn-edit-submit">
                        <i class="fas fa-key"></i> تحديث كلمة المرور
                    </button>
                </div>

                <div class="form-footer">
                    <a href="/admin" class="btn-back">
                        <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
                    </a>
                </div>
            </form>
            
        </div>
        
    </div>
</section>
{% endblock %}
