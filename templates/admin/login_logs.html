{% extends "base.html" %}
{% block content %}
<section class="container">
    <div class="page-header">
        <h1 class="page-title">سجل نشاط الدخول</h1>
        <a href="/admin" class="btn-secondary">العودة للإدارة</a>
    </div>
    
    <div class="admin-card full glass-strong">
        <div class="table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>المستخدم</th>
                        <th>التاريخ</th>
                        <th>الوقت</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in login_history %}
                    <tr>
                         <td>{{ loop.index }}</td>
                            <td><span class="perm-tag">{{ log.username }}</span></td>
                            <td>{{ log.timestamp.strftime('%Y-%m-%d') }}</td>
                            <td>{{ log.timestamp.strftime('%H:%M:%S') }}</td>
                        

                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</section>
{% endblock %}
