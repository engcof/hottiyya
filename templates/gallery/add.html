{% extends "base.html" %}

{% block title %}إضافة مادة للمعرض - الحوطية{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', path='css/add-edit.css') }}">
{% endblock %}

{% block content %}
<section class="add-edit-page">
    <div class="form-card">
        <div class="form-header">
            <h2 class="form-title">إضافة مادة للمعرض</h2>
            <p class="form-subtitle">ساهم في إثراء أرشيف الصور </p>
        </div>
            
        <form action="/gallery/add" method="POST" enctype="multipart/form-data" class="news-form" id="newsForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label>وصف الصورة <span class="required">*</span></label>
                <input type="text" name="title" class="input-field"
                placeholder="مثال: صورة تاريخية ..." required>
            </div>

            <div class="form-group">
                <label>تصنيف المادة <span class="required">*</span></label>
                <select name="category" class="input-field" required>
                    <option value="" disabled selected>-- اختر التصنيف المناسب --</option>
                    <option value="مناسبات">مناسبات</option>
                    <option value="تاريخي">تاريخي</option>
                    <option value="اجتماعات">اجتماعات</option>
                </select>
            </div>

            <div class="form-group">
                <label>الملف (صورة) <span class="required">*</span></label>
                <div class="file-input-wrapper">
                    <input type="file" id="newsImage" name="image" accept="image/*" required 
                           style="opacity: 0; position: absolute; inset: 0; cursor: pointer;">
                    
                    <div id="uploadContent">
                        <i class="fas fa-camera-retro" style="font-size: 2rem; color: var(--accent); margin-bottom: 10px;"></i>
                        <p id="fileStatusText">اضغط لاختيار الصورة من جهازك</p>
                    </div>

                    <div id="imagePreview" style="display: none; margin-top: 10px;">
                        <img id="previewImg" src="" style="width: 120px; height: 120px; object-fit: cover; border-radius: 12px; border: 2px solid var(--accent);">
                        <p id="removePreview" style="color: #ef4444; font-size: 0.85rem; margin-top: 8px; cursor: pointer; font-weight: 600;">
                            <i class="fas fa-times-circle"></i> تغيير الصورة
                        </p>
                    </div>
                </div>
            </div>

            <div class="form-actions" style="margin-top: 35px;">
                <button type="submit" class="btn-submit-main">
                    <i class="fas fa-cloud-upload-alt"></i> اعتماد ونشر في المعرض
                </button>
            </div>

            <a href="/gallery" class="cancel-text-link">إلغاء والعودة للمعرض</a>
        </form>
    </div>
</section>

<script src="{{ url_for('static', path='js/news-actions.js') }}"></script>
{% endblock %}
